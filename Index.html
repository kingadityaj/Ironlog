<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080810">
<title>IRONLOG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --card: #13131f;
  --card2: #1a1a28;
  --border: #252535;
  --border2: #32324a;
  --accent: #c8ff00;
  --accent-dim: rgba(200,255,0,0.12);
  --accent2: #ff4466;
  --accent3: #00d4ff;
  --accent4: #ff9900;
  --text: #eeeef8;
  --text2: #a0a0c0;
  --muted: #555570;
  --success: #00ffaa;
  --font-display: 'Bebas Neue', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --font-body: 'DM Sans', sans-serif;
  --r: 14px;
  --r-sm: 10px;
  --nav-h: 64px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  height: 100dvh;
  overflow: hidden;
  position: fixed;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  left: 0; right: 0;
}

#app { display:flex; flex-direction:column; height:100dvh; }

/* SCREENS */
.screen { display:none; flex-direction:column; flex:1; overflow:hidden; }
.screen.active { display:flex; }

/* HEADER */
.hdr {
  padding: 52px 20px 12px;
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  background: var(--bg);
  position: relative;
}
.hdr::after {
  content:'';
  position:absolute; bottom:0; left:0; right:0;
  height:1px;
  background: linear-gradient(90deg, transparent, var(--border2) 30%, var(--border2) 70%, transparent);
}
.logo { font-family:var(--font-display); font-size:32px; color:var(--accent); letter-spacing:3px; line-height:1; }
.logo span { color:var(--text2); }
.hdr-right { display:flex; gap:8px; align-items:center; }
.hdr-date { font-family:var(--font-mono); font-size:10px; color:var(--muted); letter-spacing:.5px; }

/* SCROLL */
.scroll { flex:1; overflow-y:auto; overflow-x:hidden; padding:16px 16px 24px; -webkit-overflow-scrolling:touch; }
.scroll::-webkit-scrollbar { display:none; }

/* BOTTOM NAV */
.bnav {
  display:flex; background:var(--surface);
  border-top:1px solid var(--border);
  height:var(--nav-h);
  padding-bottom: env(safe-area-inset-bottom, 0px);
  flex-shrink:0;
}
.nbtn {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; cursor:pointer; transition:all .15s;
  border:none; background:none; color:var(--muted);
  font-family:var(--font-mono); font-size:9px; letter-spacing:.5px;
}
.nbtn .ni { font-size:22px; line-height:1; }
.nbtn.active { color:var(--accent); }
.nbtn:active { transform:scale(.88); }

/* ICON BUTTON */
.ibtn {
  width:38px; height:38px; border-radius:10px;
  border:1px solid var(--border2); background:var(--card2);
  color:var(--text); font-size:18px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .15s; flex-shrink:0;
}
.ibtn:active { transform:scale(.9); background:var(--border); }

/* CARDS */
.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r); padding:14px; margin-bottom:10px;
}
.card.accent-border { border-color:var(--accent); box-shadow:0 0 20px rgba(200,255,0,.08); }

/* PILL TAGS */
.pill {
  display:inline-flex; align-items:center;
  padding:3px 10px; border-radius:20px;
  font-family:var(--font-mono); font-size:10px;
  letter-spacing:.5px; font-weight:500;
}
.pill-push { background:rgba(200,255,0,.1); color:var(--accent); border:1px solid rgba(200,255,0,.3); }
.pill-pull { background:rgba(0,212,255,.1); color:var(--accent3); border:1px solid rgba(0,212,255,.3); }
.pill-legs { background:rgba(255,68,102,.1); color:var(--accent2); border:1px solid rgba(255,68,102,.3); }
.pill-core { background:rgba(255,153,0,.1); color:var(--accent4); border:1px solid rgba(255,153,0,.3); }
.pill-cardio { background:rgba(0,255,170,.1); color:var(--success); border:1px solid rgba(0,255,170,.3); }

/* FORM ELEMENTS */
input, select {
  background:var(--card2); border:1px solid var(--border2);
  border-radius:var(--r-sm); color:var(--text);
  font-family:var(--font-body); font-size:15px;
  padding:11px 13px; width:100%;
  outline:none; transition:border .15s;
  -webkit-appearance:none;
}
input:focus, select:focus { border-color:var(--accent); }
input::placeholder { color:var(--muted); }
select option { background:var(--surface); }
label {
  font-family:var(--font-mono); font-size:10px;
  color:var(--muted); letter-spacing:.8px;
  display:block; margin-bottom:5px;
}

/* BUTTONS */
.btn {
  border:none; border-radius:var(--r-sm);
  font-family:var(--font-display); font-size:18px;
  letter-spacing:1px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  gap:6px; transition:all .15s; width:100%; padding:13px;
}
.btn:active { transform:scale(.97); }
.btn-primary { background:var(--accent); color:#080810; }
.btn-secondary { background:var(--card2); color:var(--text); border:1px solid var(--border2); }
.btn-danger { background:rgba(255,68,102,.15); color:var(--accent2); border:1px solid rgba(255,68,102,.3); }
.btn-sm { font-size:14px; padding:9px 14px; border-radius:8px; width:auto; }

/* SECTION TITLE */
.sec-title {
  font-family:var(--font-display); font-size:18px;
  letter-spacing:1.5px; color:var(--text2);
  margin-bottom:12px; padding-bottom:8px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}

/* WORKOUT LOG ITEM */
.log-item {
  display:flex; align-items:center; gap:10px;
  padding:12px 14px;
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r-sm); margin-bottom:8px;
  cursor:pointer; transition:all .15s;
}
.log-item:active { transform:scale(.98); border-color:var(--border2); }
.log-item-name { font-weight:600; font-size:15px; flex:1; }
.log-item-meta { font-family:var(--font-mono); font-size:11px; color:var(--muted); }
.log-item-stats { text-align:right; }
.log-item-big { font-family:var(--font-display); font-size:22px; color:var(--accent); line-height:1; }
.log-item-unit { font-family:var(--font-mono); font-size:10px; color:var(--muted); }

/* SET ROW */
.set-row {
  display:grid; grid-template-columns:36px 1fr 1fr auto;
  gap:8px; align-items:center; margin-bottom:8px;
}
.set-num {
  font-family:var(--font-mono); font-size:12px;
  color:var(--muted); text-align:center;
  background:var(--card2); border-radius:6px;
  height:38px; display:flex; align-items:center; justify-content:center;
}
.set-num.done { background:var(--accent-dim); color:var(--accent); }

/* MODAL */
.modal-overlay {
  position:fixed; inset:0; background:rgba(8,8,16,.9);
  backdrop-filter:blur(8px); z-index:100;
  display:none; align-items:flex-end; justify-content:center;
  padding-bottom:env(safe-area-inset-bottom, 0px);
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--surface); border:1px solid var(--border2);
  border-radius:24px 24px 0 0; width:100%; max-width:480px;
  padding:20px 20px 28px; max-height:90dvh; overflow-y:auto;
}
.modal::-webkit-scrollbar { display:none; }
.modal-handle {
  width:40px; height:4px; background:var(--border2);
  border-radius:2px; margin:0 auto 20px;
}
.modal-title { font-family:var(--font-display); font-size:26px; letter-spacing:1px; margin-bottom:16px; }

/* PROGRESS CHART CONTAINER */
.chart-wrap {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r); padding:14px; margin-bottom:10px;
}
.chart-title {
  font-family:var(--font-display); font-size:16px;
  letter-spacing:1px; color:var(--text2); margin-bottom:10px;
}
.chart-canvas { width:100% !important; }

/* STATS GRID */
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.stat-box {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r-sm); padding:13px;
}
.stat-val { font-family:var(--font-display); font-size:28px; color:var(--accent); line-height:1; }
.stat-lbl { font-family:var(--font-mono); font-size:9px; color:var(--muted); letter-spacing:.8px; margin-top:3px; }

/* EXERCISE LIBRARY */
.ex-lib-item {
  display:flex; align-items:center; gap:12px;
  padding:13px 14px;
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r-sm); margin-bottom:8px;
  cursor:pointer; transition:all .15s;
}
.ex-lib-item:active { border-color:var(--accent); background:var(--card2); }
.ex-icon { font-size:22px; width:36px; text-align:center; flex-shrink:0; }
.ex-info { flex:1; }
.ex-name { font-weight:600; font-size:14px; }
.ex-pattern { font-family:var(--font-mono); font-size:10px; color:var(--muted); margin-top:2px; }
.ex-muscle { font-size:11px; color:var(--text2); margin-top:1px; }

/* WORKOUT HISTORY */
.hist-item {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r); padding:14px; margin-bottom:10px;
  cursor:pointer; transition:all .15s;
}
.hist-item:active { transform:scale(.98); }
.hist-date { font-family:var(--font-mono); font-size:10px; color:var(--muted); letter-spacing:.5px; margin-bottom:6px; }
.hist-name { font-family:var(--font-display); font-size:20px; letter-spacing:1px; margin-bottom:8px; }
.hist-chips { display:flex; flex-wrap:wrap; gap:6px; }

/* EMPTY STATE */
.empty {
  text-align:center; padding:48px 20px;
  color:var(--muted); font-family:var(--font-mono); font-size:12px; letter-spacing:.5px;
}
.empty-icon { font-size:48px; margin-bottom:12px; opacity:.4; }

/* PROGRESS BAR */
.prog-bar { background:var(--border); border-radius:3px; height:4px; overflow:hidden; margin-top:8px; }
.prog-fill { height:100%; background:var(--accent); border-radius:3px; transition:width .3s; }

/* SWIPE DELETE HINT */
.swipe-hint { font-family:var(--font-mono); font-size:9px; color:var(--muted); text-align:center; padding:4px 0 8px; letter-spacing:.5px; }

/* TOGGLE */
.toggle-row { display:flex; gap:0; border-radius:10px; overflow:hidden; border:1px solid var(--border2); margin-bottom:14px; }
.toggle-opt {
  flex:1; padding:9px; text-align:center;
  font-family:var(--font-mono); font-size:11px; letter-spacing:.5px;
  cursor:pointer; color:var(--muted); transition:all .15s; border:none; background:var(--card);
}
.toggle-opt.active { background:var(--accent); color:#080810; font-weight:500; }

/* BADGE */
.badge {
  background:var(--accent); color:#080810;
  font-family:var(--font-mono); font-size:9px;
  width:17px; height:17px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-weight:700;
}

/* DIVIDER */
.divider { height:1px; background:var(--border); margin:14px 0; }

/* ANIMATIONS */
@keyframes slideUp { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.animate-in { animation:slideUp .25s ease both; }

/* PB FLASH */
@keyframes pbFlash {
  0%,100% { background:var(--card); }
  50% { background:rgba(200,255,0,.15); }
}
.pb-flash { animation:pbFlash .6s ease 2; }

.form-row { margin-bottom:12px; }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }

/* Filter chips */
.filter-chips { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:14px; }
.filter-chips::-webkit-scrollbar { display:none; }
.chip {
  flex-shrink:0; padding:6px 14px;
  border-radius:20px; border:1px solid var(--border2);
  background:var(--card); color:var(--muted);
  font-family:var(--font-mono); font-size:10px; letter-spacing:.5px;
  cursor:pointer; transition:all .15s;
}
.chip.active { background:var(--accent-dim); color:var(--accent); border-color:rgba(200,255,0,.4); }
.chip:active { transform:scale(.93); }

/* NUMBER INPUT SPINNERS OFF */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; }
input[type=number] { -moz-appearance:textfield; }

.gap-8 { gap:8px; }
.flex { display:flex; }
.flex-1 { flex:1; }
.mt-8 { margin-top:8px; }
.mt-12 { margin-top:12px; }
.mb-0 { margin-bottom:0; }

/* Confetti / PB banner */
.pb-banner {
  background:linear-gradient(135deg, var(--accent) 0%, #88ff00 100%);
  color:#080810; border-radius:var(--r-sm);
  padding:10px 14px; margin-bottom:12px;
  font-family:var(--font-display); font-size:16px; letter-spacing:1px;
  display:none; align-items:center; gap:8px;
}
.pb-banner.show { display:flex; }

/* Volume indicator */
.vol-badge {
  font-family:var(--font-mono); font-size:10px;
  color:var(--accent); background:var(--accent-dim);
  padding:2px 8px; border-radius:6px; border:1px solid rgba(200,255,0,.2);
}
</style>
</head>
<body>
<div id="app">

<!-- ══ SCREEN: LOG (TODAY) ══ -->
<div class="screen active" id="screen-log">
  <div class="hdr">
    <div>
      <div class="logo">IRON<span>LOG</span></div>
      <div class="hdr-date" id="today-date"></div>
    </div>
    <div class="hdr-right">
      <div class="ibtn" onclick="openNewWorkout()">＋</div>
    </div>
  </div>
  <div class="scroll" id="log-scroll">
    <div id="active-workout-area"></div>
    <div id="recent-workouts-area"></div>
  </div>
</div>

<!-- ══ SCREEN: EXERCISES ══ -->
<div class="screen" id="screen-exercises">
  <div class="hdr">
    <div>
      <div class="logo" style="font-size:24px">EXERCISES</div>
      <div class="hdr-date">MOVEMENT LIBRARY</div>
    </div>
    <div class="ibtn" onclick="openAddExercise()">＋</div>
  </div>
  <div class="scroll">
    <div class="filter-chips" id="pattern-filter">
      <div class="chip active" data-filter="all">ALL</div>
      <div class="chip" data-filter="Push">PUSH</div>
      <div class="chip" data-filter="Pull">PULL</div>
      <div class="chip" data-filter="Legs">LEGS</div>
      <div class="chip" data-filter="Core">CORE</div>
      <div class="chip" data-filter="Cardio">CARDIO</div>
    </div>
    <div id="exercise-list"></div>
  </div>
</div>

<!-- ══ SCREEN: PROGRESS ══ -->
<div class="screen" id="screen-progress">
  <div class="hdr">
    <div>
      <div class="logo" style="font-size:24px">PROGRESS</div>
      <div class="hdr-date">STRENGTH OVER TIME</div>
    </div>
  </div>
  <div class="scroll">
    <div class="stats-grid" id="overall-stats"></div>
    <div class="toggle-row">
      <button class="toggle-opt active" data-mode="exercise" onclick="setProgressMode('exercise')">BY EXERCISE</button>
      <button class="toggle-opt" data-mode="weekly" onclick="setProgressMode('weekly')">WEEKLY</button>
    </div>
    <div id="progress-content"></div>
  </div>
</div>

<!-- ══ SCREEN: HISTORY ══ -->
<div class="screen" id="screen-history">
  <div class="hdr">
    <div>
      <div class="logo" style="font-size:24px">HISTORY</div>
      <div class="hdr-date">ALL WORKOUTS</div>
    </div>
  </div>
  <div class="scroll">
    <div id="history-list"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <button class="nbtn active" data-screen="log" onclick="navTo('log')">
    <span class="ni">🏋️</span><span>TODAY</span>
  </button>
  <button class="nbtn" data-screen="exercises" onclick="navTo('exercises')">
    <span class="ni">📋</span><span>EXERCISES</span>
  </button>
  <button class="nbtn" data-screen="progress" onclick="navTo('progress')">
    <span class="ni">📈</span><span>PROGRESS</span>
  </button>
  <button class="nbtn" data-screen="history" onclick="navTo('history')">
    <span class="ni">🗓️</span><span>HISTORY</span>
  </button>
</nav>

</div><!-- /app -->

<!-- ══ MODAL: NEW WORKOUT ══ -->
<div class="modal-overlay" id="modal-new-workout">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">NEW WORKOUT</div>
    <div class="form-row">
      <label>WORKOUT NAME</label>
      <input id="wk-name" placeholder="e.g. Push Day A" maxlength="40">
    </div>
    <div class="row2">
      <div class="form-row">
        <label>DATE</label>
        <input id="wk-date" type="date">
      </div>
      <div class="form-row">
        <label>NOTES</label>
        <input id="wk-notes" placeholder="Optional">
      </div>
    </div>
    <button class="btn btn-primary mt-12" onclick="createWorkout()">START WORKOUT</button>
    <button class="btn btn-secondary mt-8" onclick="closeModal('modal-new-workout')">CANCEL</button>
  </div>
</div>

<!-- ══ MODAL: ADD EXERCISE TO WORKOUT ══ -->
<div class="modal-overlay" id="modal-add-to-workout">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">ADD EXERCISE</div>
    <div class="filter-chips" id="wk-pattern-filter">
      <div class="chip active" data-filter="all">ALL</div>
      <div class="chip" data-filter="Push">PUSH</div>
      <div class="chip" data-filter="Pull">PULL</div>
      <div class="chip" data-filter="Legs">LEGS</div>
      <div class="chip" data-filter="Core">CORE</div>
      <div class="chip" data-filter="Cardio">CARDIO</div>
    </div>
    <div style="margin-bottom:10px;">
      <input id="ex-search" placeholder="🔍  Search exercises..." oninput="renderExPickerList()">
    </div>
    <div id="ex-picker-list" style="max-height:300px;overflow-y:auto;"></div>
    <button class="btn btn-secondary mt-8" onclick="closeModal('modal-add-to-workout')">CLOSE</button>
  </div>
</div>

<!-- ══ MODAL: LOG SETS ══ -->
<div class="modal-overlay" id="modal-log-sets">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="sets-ex-name" class="modal-title"></div>
    <div id="pb-banner" class="pb-banner">🏆 NEW PERSONAL BEST!</div>
    <div id="sets-rows"></div>
    <button class="btn btn-secondary mt-8 btn-sm" onclick="addSetRow()" style="width:100%">＋ ADD SET</button>
    <div class="divider"></div>
    <button class="btn btn-primary" onclick="saveSets()">SAVE SETS</button>
    <button class="btn btn-secondary mt-8" onclick="closeModal('modal-log-sets')">CANCEL</button>
  </div>
</div>

<!-- ══ MODAL: ADD/EDIT EXERCISE ══ -->
<div class="modal-overlay" id="modal-exercise">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="ex-modal-title">ADD EXERCISE</div>
    <div class="form-row">
      <label>EXERCISE NAME</label>
      <input id="ex-name-input" placeholder="e.g. Bench Press" maxlength="40">
    </div>
    <div class="form-row">
      <label>MOVEMENT PATTERN</label>
      <select id="ex-pattern-input">
        <option value="Push">Push</option>
        <option value="Pull">Pull</option>
        <option value="Legs">Legs</option>
        <option value="Core">Core</option>
        <option value="Cardio">Cardio</option>
      </select>
    </div>
    <div class="form-row">
      <label>PRIMARY MUSCLES</label>
      <input id="ex-muscles-input" placeholder="e.g. Chest, Triceps, Anterior Deltoid">
    </div>
    <div class="form-row">
      <label>EMOJI ICON</label>
      <input id="ex-icon-input" placeholder="🏋️" maxlength="2" style="font-size:22px;text-align:center;">
    </div>
    <button class="btn btn-primary mt-12" onclick="saveExercise()">SAVE EXERCISE</button>
    <button id="ex-delete-btn" class="btn btn-danger mt-8" style="display:none" onclick="deleteExercise()">DELETE EXERCISE</button>
    <button class="btn btn-secondary mt-8" onclick="closeModal('modal-exercise')">CANCEL</button>
  </div>
</div>

<!-- ══ MODAL: WORKOUT DETAIL ══ -->
<div class="modal-overlay" id="modal-workout-detail">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="detail-content"></div>
    <button class="btn btn-danger mt-8" id="detail-delete-btn">DELETE WORKOUT</button>
    <button class="btn btn-secondary mt-8" onclick="closeModal('modal-workout-detail')">CLOSE</button>
  </div>
</div>

<script>
// ══════════════════════════════════════
// DATA LAYER
// ══════════════════════════════════════
const DB = {
  save(key, val) { try { localStorage.setItem('ironlog_' + key, JSON.stringify(val)); } catch(e){} },
  load(key, def) { try { const v = localStorage.getItem('ironlog_' + key); return v ? JSON.parse(v) : def; } catch(e){ return def; } }
};

// State
let exercises = DB.load('exercises', getDefaultExercises());
let workouts = DB.load('workouts', []); // [{id, name, date, notes, exercises:[{exId, sets:[{reps,weight,done}]}]}]
let activeWorkoutId = DB.load('activeWorkoutId', null);
let editingExId = null;
let loggingExIdx = null; // index in active workout's exercises
let progressMode = 'exercise';
let exFilter = 'all';
let wkExFilter = 'all';

function saveAll() {
  DB.save('exercises', exercises);
  DB.save('workouts', workouts);
  DB.save('activeWorkoutId', activeWorkoutId);
}

function getActiveWorkout() {
  return workouts.find(w => w.id === activeWorkoutId) || null;
}

// ══════════════════════════════════════
// DEFAULT EXERCISES
// ══════════════════════════════════════
function getDefaultExercises() {
  return [
    {id:'e1', name:'Bench Press', pattern:'Push', muscles:'Chest, Triceps, Anterior Deltoid', icon:'🏋️'},
    {id:'e2', name:'Overhead Press', pattern:'Push', muscles:'Shoulders, Triceps', icon:'💪'},
    {id:'e3', name:'Incline Dumbbell Press', pattern:'Push', muscles:'Upper Chest, Anterior Deltoid', icon:'🏋️'},
    {id:'e4', name:'Tricep Pushdown', pattern:'Push', muscles:'Triceps', icon:'💪'},
    {id:'e5', name:'Push-Up', pattern:'Push', muscles:'Chest, Triceps, Core', icon:'⬆️'},
    {id:'e6', name:'Dip', pattern:'Push', muscles:'Triceps, Chest, Shoulders', icon:'↕️'},
    {id:'e7', name:'Deadlift', pattern:'Pull', muscles:'Hamstrings, Glutes, Erectors, Lats', icon:'🔺'},
    {id:'e8', name:'Pull-Up', pattern:'Pull', muscles:'Lats, Biceps, Mid Back', icon:'🔼'},
    {id:'e9', name:'Barbell Row', pattern:'Pull', muscles:'Mid Back, Lats, Biceps', icon:'🔄'},
    {id:'e10', name:'Lat Pulldown', pattern:'Pull', muscles:'Lats, Biceps', icon:'⬇️'},
    {id:'e11', name:'Cable Row', pattern:'Pull', muscles:'Mid Back, Biceps', icon:'🔗'},
    {id:'e12', name:'Barbell Curl', pattern:'Pull', muscles:'Biceps, Forearms', icon:'💪'},
    {id:'e13', name:'Squat', pattern:'Legs', muscles:'Quads, Glutes, Hamstrings', icon:'🦵'},
    {id:'e14', name:'Romanian Deadlift', pattern:'Legs', muscles:'Hamstrings, Glutes, Erectors', icon:'🦵'},
    {id:'e15', name:'Leg Press', pattern:'Legs', muscles:'Quads, Glutes', icon:'🦵'},
    {id:'e16', name:'Lunges', pattern:'Legs', muscles:'Quads, Glutes, Hamstrings', icon:'🚶'},
    {id:'e17', name:'Leg Curl', pattern:'Legs', muscles:'Hamstrings', icon:'🦵'},
    {id:'e18', name:'Calf Raise', pattern:'Legs', muscles:'Gastrocnemius, Soleus', icon:'👟'},
    {id:'e19', name:'Plank', pattern:'Core', muscles:'Core, Transverse Abdominis', icon:'🪵'},
    {id:'e20', name:'Ab Crunch', pattern:'Core', muscles:'Rectus Abdominis', icon:'💥'},
    {id:'e21', name:'Hanging Leg Raise', pattern:'Core', muscles:'Hip Flexors, Lower Abs', icon:'🔼'},
    {id:'e22', name:'Running', pattern:'Cardio', muscles:'Full Body', icon:'🏃'},
    {id:'e23', name:'Cycling', pattern:'Cardio', muscles:'Legs, Cardio', icon:'🚴'},
    {id:'e24', name:'Jump Rope', pattern:'Cardio', muscles:'Calves, Cardio', icon:'⭕'},
  ];
}

// ══════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════
function navTo(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nbtn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');
  document.querySelector(`.nbtn[data-screen="${screen}"]`).classList.add('active');

  if (screen === 'log') renderLogScreen();
  if (screen === 'exercises') renderExerciseList();
  if (screen === 'progress') renderProgress();
  if (screen === 'history') renderHistory();
}

// ══════════════════════════════════════
// LOG SCREEN
// ══════════════════════════════════════
function renderLogScreen() {
  const today = new Date();
  document.getElementById('today-date').textContent =
    today.toLocaleDateString('en-IN', {weekday:'long', day:'numeric', month:'long', year:'numeric'}).toUpperCase();

  renderActiveWorkout();
  renderRecentWorkouts();
}

function renderActiveWorkout() {
  const area = document.getElementById('active-workout-area');
  const wk = getActiveWorkout();

  if (!wk) {
    area.innerHTML = `
      <div class="card accent-border animate-in" style="text-align:center;padding:24px 16px;margin-bottom:10px;">
        <div style="font-size:40px;margin-bottom:10px;">🏋️</div>
        <div style="font-family:var(--font-display);font-size:22px;letter-spacing:1px;margin-bottom:6px;">READY TO TRAIN?</div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-bottom:16px;letter-spacing:.5px;">Tap + to start a new workout session</div>
        <button class="btn btn-primary" onclick="openNewWorkout()" style="font-size:20px;">＋ NEW WORKOUT</button>
      </div>`;
    return;
  }

  const totalSets = wk.exercises.reduce((a,e)=>a+e.sets.filter(s=>s.done).length,0);
  const totalVol = wk.exercises.reduce((a,e)=>a+e.sets.filter(s=>s.done).reduce((b,s)=>b+s.weight*s.reps,0),0);

  let exerciseHTML = '';
  wk.exercises.forEach((ex, idx) => {
    const exData = exercises.find(e=>e.id===ex.exId) || {name:'Unknown',pattern:'Push',icon:'❓'};
    const doneSets = ex.sets.filter(s=>s.done).length;
    const maxW = ex.sets.filter(s=>s.done).reduce((a,s)=>Math.max(a,s.weight),0);
    exerciseHTML += `
      <div class="log-item animate-in" style="animation-delay:${idx*0.04}s" onclick="openLogSets(${idx})">
        <div style="font-size:26px">${exData.icon}</div>
        <div style="flex:1">
          <div class="log-item-name">${exData.name}</div>
          <div class="log-item-meta">${getPillHtml(exData.pattern)} &nbsp; ${exData.muscles ? exData.muscles.split(',')[0] : ''}</div>
        </div>
        <div class="log-item-stats">
          <div class="log-item-big">${doneSets}</div>
          <div class="log-item-unit">SETS DONE</div>
          ${maxW > 0 ? `<div style="font-family:var(--font-mono);font-size:10px;color:var(--accent);margin-top:2px;">${maxW}kg</div>` : ''}
        </div>
      </div>`;
  });

  area.innerHTML = `
    <div class="card accent-border animate-in" style="margin-bottom:10px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div>
          <div style="font-family:var(--font-display);font-size:22px;letter-spacing:1px;">${wk.name}</div>
          <div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);">${formatDate(wk.date)}</div>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-sm btn-secondary" onclick="openAddToWorkout()">＋ EXERCISE</button>
          <button class="btn btn-sm btn-primary" onclick="finishWorkout()">FINISH</button>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;">
        <div style="background:var(--card2);border-radius:8px;padding:10px;text-align:center;">
          <div style="font-family:var(--font-display);font-size:22px;color:var(--accent)">${wk.exercises.length}</div>
          <div style="font-family:var(--font-mono);font-size:9px;color:var(--muted);">EXERCISES</div>
        </div>
        <div style="background:var(--card2);border-radius:8px;padding:10px;text-align:center;">
          <div style="font-family:var(--font-display);font-size:22px;color:var(--accent)">${totalSets}</div>
          <div style="font-family:var(--font-mono);font-size:9px;color:var(--muted);">SETS DONE</div>
        </div>
        <div style="background:var(--card2);border-radius:8px;padding:10px;text-align:center;">
          <div style="font-family:var(--font-display);font-size:${totalVol>999?'16':'22'}px;color:var(--accent)">${totalVol > 0 ? Math.round(totalVol) : 0}</div>
          <div style="font-family:var(--font-mono);font-size:9px;color:var(--muted);">VOL (kg)</div>
        </div>
      </div>
    </div>
    <div id="active-ex-list">${exerciseHTML}</div>
    ${wk.exercises.length === 0 ? `<div class="empty"><div class="empty-icon">📋</div>No exercises yet.<br>Tap + EXERCISE to add.</div>` : ''}`;
}

function renderRecentWorkouts() {
  const area = document.getElementById('recent-workouts-area');
  const finished = workouts.filter(w => w.id !== activeWorkoutId && w.finished).slice(-3).reverse();
  if (finished.length === 0) { area.innerHTML = ''; return; }

  let html = `<div class="sec-title">RECENT</div>`;
  finished.forEach(wk => {
    const vol = wk.exercises.reduce((a,e)=>a+e.sets.filter(s=>s.done).reduce((b,s)=>b+s.weight*s.reps,0),0);
    const patterns = [...new Set(wk.exercises.map(e=>{const ex=exercises.find(x=>x.id===e.exId);return ex?ex.pattern:null;}).filter(Boolean))];
    html += `
      <div class="hist-item" onclick="openWorkoutDetail('${wk.id}')">
        <div class="hist-date">${formatDate(wk.date)}</div>
        <div class="hist-name">${wk.name}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div class="hist-chips">${patterns.map(p=>getPillHtml(p)).join('')}</div>
          <div style="font-family:var(--font-display);font-size:16px;color:var(--text2)">${Math.round(vol)}<span style="font-size:10px;font-family:var(--font-mono);color:var(--muted);"> kg vol</span></div>
        </div>
      </div>`;
  });
  area.innerHTML = html;
}

// ══════════════════════════════════════
// WORKOUT CRUD
// ══════════════════════════════════════
function openNewWorkout() {
  document.getElementById('wk-name').value = '';
  document.getElementById('wk-notes').value = '';
  document.getElementById('wk-date').value = new Date().toISOString().split('T')[0];
  openModal('modal-new-workout');
}

function createWorkout() {
  const name = document.getElementById('wk-name').value.trim();
  if (!name) { document.getElementById('wk-name').focus(); return; }
  const wk = {
    id: 'w' + Date.now(),
    name, notes: document.getElementById('wk-notes').value.trim(),
    date: document.getElementById('wk-date').value || new Date().toISOString().split('T')[0],
    exercises: [], finished: false, createdAt: Date.now()
  };
  workouts.push(wk);
  activeWorkoutId = wk.id;
  saveAll();
  closeModal('modal-new-workout');
  renderLogScreen();
}

function finishWorkout() {
  const wk = getActiveWorkout();
  if (!wk) return;
  wk.finished = true;
  activeWorkoutId = null;
  saveAll();
  renderLogScreen();
}

// ══════════════════════════════════════
// ADD EXERCISE TO WORKOUT
// ══════════════════════════════════════
function openAddToWorkout() {
  wkExFilter = 'all';
  document.getElementById('ex-search').value = '';
  document.querySelectorAll('#wk-pattern-filter .chip').forEach(c => {
    c.classList.toggle('active', c.dataset.filter === 'all');
  });
  renderExPickerList();
  openModal('modal-add-to-workout');

  // Filter chips
  document.querySelectorAll('#wk-pattern-filter .chip').forEach(c => {
    c.onclick = () => {
      wkExFilter = c.dataset.filter;
      document.querySelectorAll('#wk-pattern-filter .chip').forEach(x=>x.classList.remove('active'));
      c.classList.add('active');
      renderExPickerList();
    };
  });
}

function renderExPickerList() {
  const q = (document.getElementById('ex-search').value||'').toLowerCase();
  const filtered = exercises.filter(e =>
    (wkExFilter === 'all' || e.pattern === wkExFilter) &&
    (e.name.toLowerCase().includes(q) || (e.muscles||'').toLowerCase().includes(q))
  );
  const wk = getActiveWorkout();
  const usedIds = wk ? wk.exercises.map(e=>e.exId) : [];

  const list = document.getElementById('ex-picker-list');
  if (filtered.length === 0) { list.innerHTML = `<div class="empty" style="padding:24px 0;">No exercises found</div>`; return; }

  list.innerHTML = filtered.map(e => {
    const used = usedIds.includes(e.id);
    return `
      <div class="ex-lib-item" onclick="${used ? '' : `addExToWorkout('${e.id}')`}" style="${used ? 'opacity:.4;cursor:default;' : ''}">
        <div class="ex-icon">${e.icon}</div>
        <div class="ex-info">
          <div class="ex-name">${e.name}</div>
          <div class="ex-pattern">${e.pattern.toUpperCase()}</div>
          <div class="ex-muscle">${e.muscles||''}</div>
        </div>
        ${used ? '<div style="font-family:var(--font-mono);font-size:9px;color:var(--muted);">ADDED</div>' : '<div style="font-size:18px;color:var(--accent)">＋</div>'}
      </div>`;
  }).join('');
}

function addExToWorkout(exId) {
  const wk = getActiveWorkout();
  if (!wk) return;
  wk.exercises.push({ exId, sets: [] });
  saveAll();
  renderExPickerList();
  renderActiveWorkout();
}

// ══════════════════════════════════════
// LOG SETS MODAL
// ══════════════════════════════════════
function openLogSets(exIdx) {
  loggingExIdx = exIdx;
  const wk = getActiveWorkout();
  if (!wk) return;
  const ex = wk.exercises[exIdx];
  const exData = exercises.find(e=>e.id===ex.exId) || {name:'Unknown',icon:'❓'};

  document.getElementById('sets-ex-name').textContent = `${exData.icon} ${exData.name}`;
  document.getElementById('pb-banner').classList.remove('show');

  // Check previous best
  const prevBest = getPrevBest(ex.exId);
  renderSetRows(ex.sets, prevBest);
  openModal('modal-log-sets');
}

function getPrevBest(exId) {
  // Best weight × reps (1RM estimate) from finished workouts
  let best = 0;
  workouts.filter(w=>w.finished).forEach(wk => {
    const ex = wk.exercises.find(e=>e.exId===exId);
    if (!ex) return;
    ex.sets.filter(s=>s.done).forEach(s => {
      const est = s.weight * (1 + s.reps/30);
      if (est > best) best = est;
    });
  });
  return best;
}

function renderSetRows(sets, prevBest) {
  // If no sets, start with 3
  if (sets.length === 0) { sets.push({reps:8,weight:0,done:false},{reps:8,weight:0,done:false},{reps:8,weight:0,done:false}); }

  let html = `
    <div style="display:grid;grid-template-columns:36px 1fr 1fr auto;gap:8px;margin-bottom:8px;">
      <div style="font-family:var(--font-mono);font-size:9px;color:var(--muted);text-align:center;">SET</div>
      <div style="font-family:var(--font-mono);font-size:9px;color:var(--muted);text-align:center;">WEIGHT (kg)</div>
      <div style="font-family:var(--font-mono);font-size:9px;color:var(--muted);text-align:center;">REPS</div>
      <div style="font-family:var(--font-mono);font-size:9px;color:var(--muted);text-align:center;">✓</div>
    </div>`;

  sets.forEach((s, i) => {
    html += `
      <div class="set-row" id="set-row-${i}">
        <div class="set-num ${s.done ? 'done' : ''}" id="set-num-${i}">${i+1}</div>
        <input type="number" id="set-w-${i}" value="${s.weight||''}" placeholder="0" min="0" step="0.5" style="text-align:center;height:38px;padding:0;" oninput="updateSetLive(${i})">
        <input type="number" id="set-r-${i}" value="${s.reps||''}" placeholder="0" min="0" step="1" style="text-align:center;height:38px;padding:0;" oninput="updateSetLive(${i})">
        <div onclick="toggleSetDone(${i})" style="width:38px;height:38px;border-radius:8px;border:1px solid ${s.done ? 'var(--accent)' : 'var(--border2)'};background:${s.done ? 'var(--accent-dim)' : 'var(--card2)'};display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .15s;">${s.done ? '✅' : '○'}</div>
      </div>`;
  });
  document.getElementById('sets-rows').innerHTML = html;
}

function toggleSetDone(idx) {
  const wk = getActiveWorkout();
  if (!wk || loggingExIdx === null) return;
  const sets = wk.exercises[loggingExIdx].sets;
  const w = parseFloat(document.getElementById('set-w-'+idx).value)||0;
  const r = parseInt(document.getElementById('set-r-'+idx).value)||0;
  sets[idx] = { weight:w, reps:r, done:!sets[idx].done };
  saveAll();
  checkForPB(wk.exercises[loggingExIdx].exId, sets);
  renderSetRows(sets, getPrevBest(wk.exercises[loggingExIdx].exId));
}

function checkForPB(exId, sets) {
  const prevBest = getPrevBest(exId);
  const curBest = sets.filter(s=>s.done).reduce((a,s)=>Math.max(a, s.weight*(1+s.reps/30)),0);
  if (curBest > prevBest && curBest > 0) {
    document.getElementById('pb-banner').classList.add('show');
  }
}

function updateSetLive(idx) {
  const wk = getActiveWorkout();
  if (!wk || loggingExIdx === null) return;
  const s = wk.exercises[loggingExIdx].sets[idx];
  if (s) {
    s.weight = parseFloat(document.getElementById('set-w-'+idx).value)||0;
    s.reps = parseInt(document.getElementById('set-r-'+idx).value)||0;
  }
}

function addSetRow() {
  const wk = getActiveWorkout();
  if (!wk || loggingExIdx === null) return;
  const sets = wk.exercises[loggingExIdx].sets;
  const last = sets[sets.length-1];
  sets.push({reps: last?last.reps:8, weight: last?last.weight:0, done:false});
  saveAll();
  renderSetRows(sets, getPrevBest(wk.exercises[loggingExIdx].exId));
}

function saveSets() {
  // Sync all inputs to state
  const wk = getActiveWorkout();
  if (!wk || loggingExIdx === null) return;
  const sets = wk.exercises[loggingExIdx].sets;
  sets.forEach((s,i) => {
    s.weight = parseFloat(document.getElementById('set-w-'+i)?.value)||0;
    s.reps = parseInt(document.getElementById('set-r-'+i)?.value)||0;
  });
  saveAll();
  closeModal('modal-log-sets');
  renderActiveWorkout();
}

// ══════════════════════════════════════
// EXERCISES SCREEN
// ══════════════════════════════════════
function renderExerciseList() {
  const filtered = exercises.filter(e => exFilter === 'all' || e.pattern === exFilter);
  const list = document.getElementById('exercise-list');
  if (filtered.length === 0) { list.innerHTML = `<div class="empty"><div class="empty-icon">📋</div>No exercises in this category.</div>`; return; }

  list.innerHTML = filtered.map(e => `
    <div class="ex-lib-item animate-in" onclick="openEditExercise('${e.id}')">
      <div class="ex-icon">${e.icon}</div>
      <div class="ex-info">
        <div class="ex-name">${e.name}</div>
        <div class="ex-pattern" style="margin-top:3px;">${getPillHtml(e.pattern)}</div>
        <div class="ex-muscle">${e.muscles||''}</div>
      </div>
      <div style="font-size:14px;color:var(--muted)">›</div>
    </div>`).join('');

  // filter chips
  document.querySelectorAll('#pattern-filter .chip').forEach(c => {
    c.onclick = () => {
      exFilter = c.dataset.filter;
      document.querySelectorAll('#pattern-filter .chip').forEach(x=>x.classList.remove('active'));
      c.classList.add('active');
      renderExerciseList();
    };
  });
}

function openAddExercise() {
  editingExId = null;
  document.getElementById('ex-modal-title').textContent = 'ADD EXERCISE';
  document.getElementById('ex-name-input').value = '';
  document.getElementById('ex-muscles-input').value = '';
  document.getElementById('ex-icon-input').value = '🏋️';
  document.getElementById('ex-pattern-input').value = 'Push';
  document.getElementById('ex-delete-btn').style.display = 'none';
  openModal('modal-exercise');
}

function openEditExercise(id) {
  editingExId = id;
  const e = exercises.find(x=>x.id===id);
  if (!e) return;
  document.getElementById('ex-modal-title').textContent = 'EDIT EXERCISE';
  document.getElementById('ex-name-input').value = e.name;
  document.getElementById('ex-muscles-input').value = e.muscles||'';
  document.getElementById('ex-icon-input').value = e.icon||'🏋️';
  document.getElementById('ex-pattern-input').value = e.pattern;
  document.getElementById('ex-delete-btn').style.display = 'flex';
  openModal('modal-exercise');
}

function saveExercise() {
  const name = document.getElementById('ex-name-input').value.trim();
  if (!name) return;
  const data = {
    name, pattern: document.getElementById('ex-pattern-input').value,
    muscles: document.getElementById('ex-muscles-input').value.trim(),
    icon: document.getElementById('ex-icon-input').value.trim() || '🏋️'
  };
  if (editingExId) {
    const idx = exercises.findIndex(e=>e.id===editingExId);
    if (idx >= 0) exercises[idx] = {...exercises[idx], ...data};
  } else {
    exercises.push({id:'e'+Date.now(), ...data});
  }
  saveAll();
  closeModal('modal-exercise');
  renderExerciseList();
}

function deleteExercise() {
  if (!editingExId) return;
  if (!confirm('Delete this exercise?')) return;
  exercises = exercises.filter(e=>e.id!==editingExId);
  saveAll();
  closeModal('modal-exercise');
  renderExerciseList();
}

// ══════════════════════════════════════
// PROGRESS SCREEN
// ══════════════════════════════════════
let chartInstances = {};

function setProgressMode(mode) {
  progressMode = mode;
  document.querySelectorAll('.toggle-opt').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  renderProgressContent();
}

function renderProgress() {
  renderOverallStats();
  renderProgressContent();
}

function renderOverallStats() {
  const finished = workouts.filter(w=>w.finished);
  const totalVol = finished.reduce((a,wk)=>a+wk.exercises.reduce((b,e)=>b+e.sets.filter(s=>s.done).reduce((c,s)=>c+s.weight*s.reps,0),0),0);
  const totalSets = finished.reduce((a,wk)=>a+wk.exercises.reduce((b,e)=>b+e.sets.filter(s=>s.done).length,0),0);
  const uniqueEx = new Set(finished.flatMap(wk=>wk.exercises.map(e=>e.exId))).size;

  document.getElementById('overall-stats').innerHTML = `
    <div class="stat-box">
      <div class="stat-val">${finished.length}</div>
      <div class="stat-lbl">WORKOUTS</div>
    </div>
    <div class="stat-box">
      <div class="stat-val">${totalSets}</div>
      <div class="stat-lbl">TOTAL SETS</div>
    </div>
    <div class="stat-box">
      <div class="stat-val">${Math.round(totalVol/1000*10)/10}k</div>
      <div class="stat-lbl">TOTAL VOL (kg)</div>
    </div>
    <div class="stat-box">
      <div class="stat-val">${uniqueEx}</div>
      <div class="stat-lbl">EXERCISES LOGGED</div>
    </div>`;
}

function renderProgressContent() {
  // Destroy old charts
  Object.values(chartInstances).forEach(c => { try { c.destroy(); } catch(e){} });
  chartInstances = {};

  const el = document.getElementById('progress-content');
  const finished = workouts.filter(w=>w.finished);
  if (finished.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📈</div>Complete workouts to see progress graphs.</div>`;
    return;
  }

  if (progressMode === 'exercise') {
    renderExerciseProgress(el, finished);
  } else {
    renderWeeklyProgress(el, finished);
  }
}

function renderExerciseProgress(el, finished) {
  // Find exercises that have been logged at least twice
  const exMap = {};
  finished.forEach(wk => {
    wk.exercises.forEach(e => {
      if (!exMap[e.exId]) exMap[e.exId] = [];
      const maxW = e.sets.filter(s=>s.done).reduce((a,s)=>Math.max(a,s.weight),0);
      const vol = e.sets.filter(s=>s.done).reduce((a,s)=>a+s.weight*s.reps,0);
      const est1rm = e.sets.filter(s=>s.done).reduce((a,s)=>Math.max(a, s.weight*(1+s.reps/30)),0);
      if (maxW > 0 || vol > 0) {
        exMap[e.exId].push({ date:wk.date, maxW, vol, est1rm });
      }
    });
  });

  const validExIds = Object.keys(exMap).filter(id=>exMap[id].length >= 1);
  if (validExIds.length === 0) {
    el.innerHTML = `<div class="empty">Log weights to see exercise progression.</div>`;
    return;
  }

  let html = '';
  validExIds.forEach((exId, i) => {
    html += `<div class="chart-wrap"><div class="chart-title" id="ctitle-${i}"></div><canvas id="chart-${i}" class="chart-canvas" height="160"></canvas></div>`;
  });
  el.innerHTML = html;

  validExIds.forEach((exId, i) => {
    const exData = exercises.find(e=>e.id===exId) || {name:'Unknown', icon:'❓'};
    const data = exMap[exId].sort((a,b)=>a.date.localeCompare(b.date));
    document.getElementById(`ctitle-${i}`).textContent = `${exData.icon} ${exData.name.toUpperCase()} — MAX WEIGHT (kg)`;

    const labels = data.map(d => formatDateShort(d.date));
    const weights = data.map(d=>d.maxW);

    const ctx = document.getElementById(`chart-${i}`).getContext('2d');
    chartInstances[`ex-${i}`] = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Max Weight (kg)',
          data: weights,
          borderColor: '#c8ff00',
          backgroundColor: 'rgba(200,255,0,0.08)',
          borderWidth: 2,
          pointBackgroundColor: '#c8ff00',
          pointRadius: 5,
          pointHoverRadius: 7,
          tension: 0.35,
          fill: true,
        }]
      },
      options: chartOptions('kg')
    });
  });
}

function renderWeeklyProgress(el, finished) {
  // Group by ISO week
  const weekMap = {};
  finished.forEach(wk => {
    const week = getISOWeek(new Date(wk.date));
    if (!weekMap[week]) weekMap[week] = { vol:0, sets:0, workouts:0 };
    weekMap[week].vol += wk.exercises.reduce((a,e)=>a+e.sets.filter(s=>s.done).reduce((b,s)=>b+s.weight*s.reps,0),0);
    weekMap[week].sets += wk.exercises.reduce((a,e)=>a+e.sets.filter(s=>s.done).length,0);
    weekMap[week].workouts++;
  });

  const weeks = Object.keys(weekMap).sort();
  if (weeks.length === 0) { el.innerHTML = `<div class="empty">No data yet.</div>`; return; }

  el.innerHTML = `
    <div class="chart-wrap"><div class="chart-title">📅 WEEKLY VOLUME (kg)</div><canvas id="chart-wvol" class="chart-canvas" height="160"></canvas></div>
    <div class="chart-wrap"><div class="chart-title">💪 WEEKLY SETS</div><canvas id="chart-wsets" class="chart-canvas" height="160"></canvas></div>`;

  const labels = weeks.map(w => 'Wk ' + w.split('-W')[1] + ' ' + w.split('-W')[0].slice(2));

  chartInstances['wvol'] = new Chart(document.getElementById('chart-wvol').getContext('2d'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Volume (kg)',
        data: weeks.map(w=>Math.round(weekMap[w].vol)),
        backgroundColor: 'rgba(200,255,0,0.25)',
        borderColor: '#c8ff00',
        borderWidth: 1.5,
        borderRadius: 6,
      }]
    },
    options: chartOptions('kg')
  });

  chartInstances['wsets'] = new Chart(document.getElementById('chart-wsets').getContext('2d'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Sets',
        data: weeks.map(w=>weekMap[w].sets),
        backgroundColor: 'rgba(0,212,255,0.2)',
        borderColor: '#00d4ff',
        borderWidth: 1.5,
        borderRadius: 6,
      }]
    },
    options: chartOptions('sets')
  });
}

function chartOptions(unit) {
  return {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1a1a28',
        borderColor: '#32324a',
        borderWidth: 1,
        titleColor: '#c8ff00',
        bodyColor: '#eeeef8',
        titleFont: { family: "'DM Mono', monospace", size: 11 },
        bodyFont: { family: "'DM Mono', monospace", size: 11 },
        padding: 10,
        callbacks: { label: ctx => ` ${ctx.parsed.y} ${unit}` }
      }
    },
    scales: {
      x: {
        ticks: { color: '#555570', font: { family: "'DM Mono',monospace", size: 9 }, maxRotation: 0 },
        grid: { color: 'rgba(37,37,53,.6)' },
      },
      y: {
        ticks: { color: '#555570', font: { family: "'DM Mono',monospace", size: 9 } },
        grid: { color: 'rgba(37,37,53,.6)' },
        beginAtZero: true
      }
    }
  };
}

// ══════════════════════════════════════
// HISTORY SCREEN
// ══════════════════════════════════════
function renderHistory() {
  const finished = workouts.filter(w=>w.finished).slice().reverse();
  const el = document.getElementById('history-list');
  if (finished.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🗓️</div>No finished workouts yet.</div>`;
    return;
  }

  el.innerHTML = finished.map(wk => {
    const vol = wk.exercises.reduce((a,e)=>a+e.sets.filter(s=>s.done).reduce((b,s)=>b+s.weight*s.reps,0),0);
    const sets = wk.exercises.reduce((a,e)=>a+e.sets.filter(s=>s.done).length,0);
    const patterns = [...new Set(wk.exercises.map(e=>{const ex=exercises.find(x=>x.id===e.exId);return ex?ex.pattern:null;}).filter(Boolean))];
    return `
      <div class="hist-item animate-in" onclick="openWorkoutDetail('${wk.id}')">
        <div class="hist-date">${formatDate(wk.date)}</div>
        <div class="hist-name">${wk.name}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;">
          <div class="hist-chips">${patterns.map(p=>getPillHtml(p)).join('')}</div>
          <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);">${wk.exercises.length} ex · ${sets} sets · ${Math.round(vol)}kg</div>
        </div>
      </div>`;
  }).join('');
}

function openWorkoutDetail(wkId) {
  const wk = workouts.find(w=>w.id===wkId);
  if (!wk) return;
  const vol = wk.exercises.reduce((a,e)=>a+e.sets.filter(s=>s.done).reduce((b,s)=>b+s.weight*s.reps,0),0);

  let exHTML = wk.exercises.map(ex => {
    const exData = exercises.find(e=>e.id===ex.exId) || {name:'Unknown',icon:'❓'};
    const doneSets = ex.sets.filter(s=>s.done);
    const setsHTML = doneSets.map((s,i) =>
      `<div style="font-family:var(--font-mono);font-size:11px;color:var(--text2);padding:3px 0;border-bottom:1px solid var(--border);">Set ${i+1}: <span style="color:var(--accent)">${s.weight}kg</span> × <span style="color:var(--accent)">${s.reps}</span> reps</div>`
    ).join('');
    return `
      <div style="margin-bottom:14px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <span style="font-size:20px">${exData.icon}</span>
          <span style="font-weight:600">${exData.name}</span>
          ${getPillHtml(exData.pattern)}
        </div>
        ${setsHTML || '<div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);">No sets logged</div>'}
      </div>`;
  }).join('');

  document.getElementById('detail-content').innerHTML = `
    <div style="font-family:var(--font-display);font-size:26px;letter-spacing:1px;margin-bottom:4px;">${wk.name}</div>
    <div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-bottom:16px;">${formatDate(wk.date)} · ${Math.round(vol)}kg total volume</div>
    <div class="divider"></div>
    ${exHTML}`;

  document.getElementById('detail-delete-btn').onclick = () => {
    if (!confirm('Delete this workout? This cannot be undone.')) return;
    workouts = workouts.filter(w=>w.id!==wkId);
    saveAll();
    closeModal('modal-workout-detail');
    renderHistory();
    renderLogScreen();
  };

  openModal('modal-workout-detail');
}

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
function getPillHtml(pattern) {
  const cls = { Push:'pill-push', Pull:'pill-pull', Legs:'pill-legs', Core:'pill-core', Cardio:'pill-cardio' };
  return `<span class="pill ${cls[pattern]||'pill-push'}">${pattern.toUpperCase()}</span>`;
}

function formatDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'});
}

function formatDateShort(d) {
  if (!d) return '';
  const dt = new Date(d);
  return `${dt.getDate()}/${dt.getMonth()+1}`;
}

function getISOWeek(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - (d.getDay()+6)%7);
  const week1 = new Date(d.getFullYear(), 0, 4);
  const weekNum = 1 + Math.round(((d-week1)/86400000 - 3 + (week1.getDay()+6)%7)/7);
  return `${d.getFullYear()}-W${String(weekNum).padStart(2,'0')}`;
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}

// Close modal on overlay tap
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeModal(overlay.id);
  });
});

document.addEventListener('DOMContentLoaded', () => {
  renderLogScreen();
});

// PWA Service Worker
if ('serviceWorker' in navigator) {
  const sw = `
self.addEventListener('install', e => self.skipWaiting());
self.addEventListener('activate', e => e.waitUntil(clients.claim()));
self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => new Response('Offline'))));
`;
  const blob = new Blob([sw], {type:'application/javascript'});
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}
